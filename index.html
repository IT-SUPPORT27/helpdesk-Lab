<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelaporan IT & ATK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { background-color: #f4f7f6; padding-top: 50px; padding-bottom: 50px; } .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); } </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4 text-primary">Portal Pelaporan Kerusakan IT</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-3">Buat Laporan Baru</h4>
                
                <form id="formPelaporan">
                    <div class="mb-3">
                        <label class="form-label">Nama Pelapor</label>
                        <input type="text" class="form-control" name="nama" required placeholder="Masukkan nama Anda">
                    </div>

                    <div class="mb-3">
                         <label class="form-label">Ruang LAB</label>
                         <select class="form-select" name="ruang_lab" id="ruang_lab" required>
                          <option value="" selected disabled>Memuat pilihan ruangan...</option>
                       </select>
                    </div>

                    <div class="mb-3">
                          <label class="form-label">Kategori Kerusakan</label>
                          <select class="form-select" name="kategori" id="kategori" required>
                          <option value="" selected disabled>Memuat pilihan kategori...</option>
                        </select>
                    </div>

<div class="mb-3">
    <label class="form-label">Tingkat Prioritas</label>
    <select class="form-select" name="prioritas" id="prioritas" required>
        <option value="" selected disabled>Memuat pilihan prioritas...</option>
    </select>
</div>

                    <div class="mb-3">
                        <label class="form-label">Tingkat Prioritas</label>
                        <select class="form-select" name="prioritas" required>
                            <option value="Rendah">Rendah (Bisa ditunda)</option>
                            <option value="Sedang" selected>Sedang (Mengganggu aktivitas)</option>
                            <option value="Tinggi">Tinggi (Mati total / Darurat)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Deskripsi Kendala</label>
                        <textarea class="form-control" name="deskripsi" rows="3" required placeholder="Contoh: PC nomor 05 tidak bisa menyala dan berbunyi beep panjang..."></textarea>
                    </div>
                    
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100 fw-bold">Kirim Laporan</button>
                    
                    <div id="notifikasi" class="alert mt-3 d-none" role="alert"></div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('formPelaporan');
    const btnSubmit = document.getElementById('btnSubmit');
    const notifikasi = document.getElementById('notifikasi');

    // PASTE URL WEB APP GOOGLE SCRIPT ANDA DI BAWAH INI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx_sHxiph4Fw1cO83crglecsRmZNK6wPlXu4-Eq91J28pjf33WapnXZo4CDxtGoUAfI/exec';
    // FITUR BARU: MENGAMBIL OPSI DARI GOOGLE SHEETS
    document.addEventListener("DOMContentLoaded", function() {
        fetch(scriptURL) // Ini memanggil fungsi doGet() di Apps Script
            .then(response => response.json())
            .then(data => {
                if(data.error) {
                    console.error("Error dari server:", data.error);
                    return;
                }
                
                // Fungsi untuk memasukkan data array ke dalam elemen <select>
                function isiDropdown(idDropdown, arrayData, teksDefault) {
                    const dropdown = document.getElementById(idDropdown);
                    dropdown.innerHTML = `<option value="" selected disabled>${teksDefault}</option>`;
                    arrayData.forEach(item => {
                        let option = document.createElement("option");
                        option.value = item;
                        option.textContent = item;
                        dropdown.appendChild(option);
                    });
                }

                // Masukkan data ke masing-masing kolom
                if(data.ruangan) isiDropdown('ruang_lab', data.ruangan, 'Pilih Ruangan...');
                if(data.kategori) isiDropdown('kategori', data.kategori, 'Pilih Kategori...');
                if(data.prioritas) isiDropdown('prioritas', data.prioritas, 'Pilih Prioritas...');
            })
            .catch(error => console.error('Gagal mengambil data:', error));
    });

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        btnSubmit.innerHTML = 'Mengirim...';
        btnSubmit.disabled = true;
        notifikasi.classList.add('d-none');

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                notifikasi.classList.remove('d-none', 'alert-danger');
                notifikasi.classList.add('alert-success');
                notifikasi.innerHTML = '✅ Laporan berhasil terkirim ke tim IT!';
                form.reset();
                btnSubmit.innerHTML = 'Kirim Laporan';
                btnSubmit.disabled = false;
            })
            .catch(error => {
                notifikasi.classList.remove('d-none', 'alert-success');
                notifikasi.classList.add('alert-danger');
                notifikasi.innerHTML = '❌ Gagal mengirim laporan. Periksa koneksi internet Anda.';
                btnSubmit.innerHTML = 'Kirim Laporan';
                btnSubmit.disabled = false;
            });
    });
</script>

</body>
</html>
